[tasks.build]
description = "Build the iOS app for simulator"
run = "xcodebuild -project Noisey.xcodeproj -scheme Noisey -destination 'platform=iOS Simulator,name=iPhone 17 Pro' build"

[tasks.clean]
description = "Clean build artifacts"
run = "xcodebuild -project Noisey.xcodeproj -scheme Noisey clean"

[tasks.open]
description = "Open project in Xcode"
run = "open Noisey.xcodeproj"

[tasks.sim]
description = "Build and run in iOS Simulator"
run = """
set -e
DEVICE='iPhone 17 Pro'
BUNDLE_ID='com.noisey.app'
xcodebuild -project Noisey.xcodeproj -scheme Noisey -destination "platform=iOS Simulator,name=$DEVICE" build
PRODUCTS_DIR=$(xcodebuild -project Noisey.xcodeproj -scheme Noisey -destination "platform=iOS Simulator,name=$DEVICE" -showBuildSettings 2>/dev/null | grep -m1 BUILT_PRODUCTS_DIR | awk '{print $3}')
xcrun simctl boot "$DEVICE" 2>/dev/null || true
xcrun simctl install "$DEVICE" "$PRODUCTS_DIR/Noisey.app"
xcrun simctl launch "$DEVICE" "$BUNDLE_ID"
"""
