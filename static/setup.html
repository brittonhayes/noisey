<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Noisey - WiFi Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setup.css">
</head>
<body>
    <div class="setup-container">
        <header class="setup-header">
            <div class="logo">noisey</div>
            <p class="subtitle">WiFi Setup</p>
        </header>

        <!-- Status Banner -->
        <div id="status-banner" class="status-banner hidden">
            <span id="status-text"></span>
        </div>

        <!-- Network List -->
        <section id="scan-section" class="section">
            <div class="section-header">
                <h2>Available Networks</h2>
                <button id="refresh-btn" class="btn-icon" title="Rescan">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                </button>
            </div>
            <div id="network-list" class="network-list">
                <div class="loading">Scanning for networks...</div>
            </div>
        </section>

        <!-- Connect Form (shown after selecting a network) -->
        <section id="connect-section" class="section hidden">
            <h2>Connect to <span id="selected-ssid"></span></h2>
            <form id="connect-form">
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter WiFi password" autocomplete="off">
                </div>
                <div class="form-actions">
                    <button type="button" id="back-btn" class="btn btn-secondary">Back</button>
                    <button type="submit" id="connect-btn" class="btn btn-primary">Connect</button>
                </div>
            </form>
        </section>

        <!-- Success State -->
        <section id="success-section" class="section hidden">
            <div class="success-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <h2>Connected!</h2>
                <p>Your Noisey device is now on your WiFi network.</p>
                <p class="ip-display">Access it at: <strong>http://<span id="device-ip"></span>:8080</strong></p>
                <p class="hint">You can now disconnect from "Noisey-Setup" and connect to your regular WiFi.</p>
            </div>
        </section>
    </div>

    <script src="setup.js"></script>
</body>
</html>
